<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Citoyen - SmartWaste</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="index.html"><span></span>SmartWaste</a>
    <div><a class="active" href="citizen.html">Citoyen</a><a href="driver.html">Chauffeur</a><a href="admin.html">Admin</a></div>
  </nav>
  <main class="layout">
    <section class="panel control-panel">
      <p class="eyebrow">Carte citoyenne</p>
      <h1>Poubelles proches</h1>
      <p class="muted">Consultez les poubelles disponibles et evitez les points deja pleins.</p>
      <button id="nearestBtn" class="primary-action">Trouver une poubelle disponible</button>
      <div id="nearestResult" class="notice"></div>
      <div id="binList" class="list"></div>
    </section>
    <section class="map-wrap">
      <div class="map-toolbar">
        <span class="legend empty">Vide</span>
        <span class="legend medium">Moyenne</span>
        <span class="legend full">Pleine</span>
      </div>
      <div id="map" class="map"></div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
